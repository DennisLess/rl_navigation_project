behaviors:
  MazeAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 128
      buffer_size: 4096
      learning_rate: 1.0e-4
      beta: 0.05
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 5
    network_settings:
      num_layers: 2
      hidden_units: 128
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000
    time_horizon: 64
    summary_freq: 5000
    keep_checkpoints: 10
    checkpoint_interval: 50000