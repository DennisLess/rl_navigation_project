behaviors:
  MazeAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 512
      learning_rate: 7.0e-4
      beta: 1.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 1
    network_settings:
      num_layers: 2
      hidden_units: 128
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 500000
    time_horizon: 32
    summary_freq: 5000

# WICHTIG: A2c nutzt in ML-Agents trainer_type ppo, da A2c eine spezielle Form von PPO ist. Die Hyperparameter sind jedoch speziell für A2c angepasst.